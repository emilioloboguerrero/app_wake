<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Wake Lab" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#1a1a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wake" />
  <!-- F-CFG-03 (Round 2): permissive in-HTML CSP removed. The strict CSP
       served as a Hosting header (firebase.json /app/** block) is the
       authoritative policy. Adding a permissive meta-tag here did nothing
       useful — browsers enforce the intersection of all CSP sources, so
       the meta tag could only relax things it never relaxed in practice. -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <!-- EXPO_CSS_LINKS: replaced by build script with Expo bundle CSS (global, InstallScreen, etc.) -->
  <link rel="icon" href="/app_icon.png" />
  <link rel="apple-touch-icon" href="/app_icon.png" />
  <title>Wake lab</title>
  <style>
    /* Critical: full viewport height chain for all routes (login + app) */
    html {
      height: 100%;
    }
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      height: 100%;
      background-color: #1a1a1a;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    #root {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 100vh;
      min-height: 100svh;
    }
    #root > * {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      pointer-events: none;
    }

    #loading-screen.hidden {
      display: none;
    }

    #loading-screen.recovery {
      pointer-events: auto;
    }

    .loading-logo {
      width: 120px;
      height: auto;
      margin-bottom: 24px;
      opacity: 0.9;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-recovery {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 0 32px;
      max-width: 360px;
      text-align: center;
    }

    #loading-screen.recovery .loading-spinner {
      display: none;
    }

    #loading-screen.recovery .loading-recovery {
      display: flex;
    }

    .loading-recovery-text {
      color: rgba(255, 255, 255, 0.7);
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .loading-recovery-button {
      background: rgba(255, 255, 255, 0.9);
      color: #1a1a1a;
      border: none;
      padding: 14px 28px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      font-family: inherit;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Hide scrollbar but allow scrolling */
    ::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }

    /* Critical: tab bar "+" button circle from first paint (avoids square flash before global.css loads).
       Solid background + inline SVG plus (no mask) so fill and icon paint together. */
    .wake-tab-bar-add-button-wrap {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      overflow: hidden;
      flex-shrink: 0;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .wake-tab-bar-add-button {
      width: 100%;
      height: 100%;
      min-width: 60px;
      min-height: 60px;
      border: none;
      background: rgba(255, 255, 255, 0.8);
      cursor: pointer;
      padding: 0;
      box-sizing: border-box;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease;
      -webkit-appearance: none;
      appearance: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="loading-screen">
    <img src="/assets/wake-logo-new.png" alt="Wake" class="loading-logo" />
    <div class="loading-spinner"></div>
    <div class="loading-recovery">
      <div class="loading-recovery-text">No pudimos cargar la app. Reintenta para continuar.</div>
      <button type="button" class="loading-recovery-button" id="loading-recovery-button">Reintentar</button>
    </div>
  </div>

  <script>
    // Register Service Worker - SKIP FOR LOGIN ROUTE
    // Only register if /sw.js is served as JS (not as index.html fallback - fixes "unsupported MIME type text/html")
    if ('serviceWorker' in navigator && window.location.pathname !== '__LOGIN_PATH__') {
      window.addEventListener('load', () => {
        fetch('/sw.js', { method: 'HEAD' })
          .then(function (res) {
            var ct = res.headers.get('content-type') || '';
            if (ct.indexOf('javascript') === -1 && ct.indexOf('ecmascript') === -1) {
              return;
            }
            return navigator.serviceWorker.register('/sw.js');
          })
          .then(function () {})
          .catch(function () {});
      });
    } else if (window.location.pathname === '__LOGIN_PATH__') {
      // Unregister service worker for login route
      navigator.serviceWorker.getRegistrations().then((registrations) => {
        registrations.forEach((registration) => {
          registration.unregister();
        });
      });
    }

    // Hide loading screen only when React mounts. If the bundle fails to
    // execute (e.g. cached shell points at a deleted hash and Hosting's SPA
    // rewrite returns HTML for a .js URL → "Unexpected token '<'"), the
    // recovery UI is shown instead of leaving the user on a black screen.
    (function() {
      var loadingScreen = document.getElementById('loading-screen');
      var rootEl = document.getElementById('root');
      if (!loadingScreen || !rootEl) return;

      var hidden = false;
      function hideLoading() {
        if (hidden) return;
        hidden = true;
        loadingScreen.classList.add('hidden');
      }
      function showRecovery() {
        if (hidden) return;
        loadingScreen.classList.add('recovery');
      }

      var observer = new MutationObserver(function() {
        if (rootEl.firstElementChild) {
          observer.disconnect();
          hideLoading();
        }
      });
      observer.observe(rootEl, { childList: true });
      if (rootEl.firstElementChild) {
        observer.disconnect();
        hideLoading();
        return;
      }

      var fallbackTimer = setTimeout(showRecovery, 12000);

      window.addEventListener('error', function(e) {
        var msg = (e && e.message) || '';
        if (msg.indexOf('Unexpected token') !== -1 || msg.indexOf('SyntaxError') !== -1) {
          clearTimeout(fallbackTimer);
          showRecovery();
        }
      });

      var btn = document.getElementById('loading-recovery-button');
      if (btn) {
        btn.addEventListener('click', function() {
          btn.disabled = true;
          var clearAll = Promise.resolve();
          if (window.caches && caches.keys) {
            clearAll = caches.keys().then(function(keys) {
              return Promise.all(keys.map(function(k) { return caches.delete(k); }));
            }).catch(function() {});
          }
          var unregister = Promise.resolve();
          if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
            unregister = navigator.serviceWorker.getRegistrations().then(function(regs) {
              return Promise.all(regs.map(function(r) { return r.unregister(); }));
            }).catch(function() {});
          }
          Promise.all([clearAll, unregister]).then(function() {
            window.location.reload();
          });
        });
      }
    })();

    // Prevent zoom on double tap (iOS) – only prevent when same target, so button/link taps work
    let lastTouchEnd = 0;
    let lastTouchTarget = null;
    document.addEventListener('touchend', (event) => {
      const now = Date.now();
      const sameTarget = event.target === lastTouchTarget;
      if (sameTarget && now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
      lastTouchTarget = event.target;
    }, false);

    // Pull-to-refresh: left to browser default (no document-level prevention)
    // so vertical scroll works in the in-app ScrollView and pull-to-refresh remains a feature

    // iOS PWA viewport fix: 100vh/100svh use "small" viewport leaving a bottom gap. Run before React so we
    // catch standalone even when matchMedia/navigator.standalone report late. Uses all detection methods,
    // delayed re-checks, and display-mode listener.
    (function() {
      function isStandalone() {
        if (window.matchMedia) {
          if (window.matchMedia('(display-mode: standalone)').matches) return true;
          if (window.matchMedia('(display-mode: minimal-ui)').matches) return true;
        }
        return !!(window.navigator && window.navigator.standalone === true);
      }
      function isIOS() {
        return /iPhone|iPad|iPod/.test(navigator.userAgent || '');
      }
      function isAndroid() {
        return /Android/.test(navigator.userAgent || '');
      }
      function shouldApplyPWAViewportFix() {
        if (isStandalone()) return true;
        if (isIOS() && window.screen && window.screen.availHeight) {
          var ih = window.innerHeight || 0;
          if (window.visualViewport && window.visualViewport.height) {
            ih = Math.max(ih, window.visualViewport.height);
          }
          if (ih >= window.screen.availHeight - 2) return true;
        }
        return true;
      }
      function getCanonicalHeight() {
        var h = window.innerHeight || 0;
        if (window.visualViewport && window.visualViewport.height) {
          h = Math.max(h, window.visualViewport.height);
        }
        if (window.screen && window.screen.availHeight) {
          var nearFull = h >= window.screen.availHeight - 2;
          var useAvail = (isIOS() && (isStandalone() || nearFull)) || (isStandalone() && isAndroid());
          if (useAvail) {
            h = Math.max(h, window.screen.availHeight);
          }
        }
        return Math.round(h);
      }
      function getCanonicalWidth() {
        if (window.visualViewport) {
          return Math.round(window.visualViewport.width * window.visualViewport.scale);
        }
        return document.documentElement.clientWidth || window.innerWidth || 0;
      }
      function setLayoutViewportCSSVars() {
        var w = getCanonicalWidth();
        var h = getCanonicalHeight();
        if (w > 0 && h > 0) {
          document.documentElement.style.setProperty('--layout-width-px', w + 'px');
          document.documentElement.style.setProperty('--layout-height-px', h + 'px');
        }
      }
      function applyPWAViewportHeight() {
        setLayoutViewportCSSVars();
        if (!shouldApplyPWAViewportFix()) return;
        var root = document.getElementById('root');
        if (!root) return;
        var h = getCanonicalHeight();
        if (h <= 0) return;
        document.documentElement.style.setProperty('height', h + 'px');
        document.documentElement.style.setProperty('min-height', h + 'px');
        document.body.style.setProperty('height', h + 'px');
        document.body.style.setProperty('min-height', h + 'px');
        root.style.setProperty('height', h + 'px');
        root.style.setProperty('min-height', h + 'px');
        root.style.setProperty('max-height', h + 'px');
      }
      applyPWAViewportHeight();
      setTimeout(applyPWAViewportHeight, 100);
      setTimeout(applyPWAViewportHeight, 300);
      setTimeout(applyPWAViewportHeight, 800);
      window.addEventListener('resize', applyPWAViewportHeight);
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', applyPWAViewportHeight);
        window.visualViewport.addEventListener('scroll', applyPWAViewportHeight);
      }
      var mq = window.matchMedia && window.matchMedia('(display-mode: standalone)');
      if (mq && mq.addEventListener) {
        mq.addEventListener('change', function(e) { if (e.matches) applyPWAViewportHeight(); });
      }
      var mqMin = window.matchMedia && window.matchMedia('(display-mode: minimal-ui)');
      if (mqMin && mqMin.addEventListener) {
        mqMin.addEventListener('change', function(e) { if (e.matches) applyPWAViewportHeight(); });
      }
    })();
  </script>
  <!-- EXPO_BUNDLE_SCRIPT: replaced by build script with actual bundle script tag -->
</body>
</html>
